<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Desa Margomulyo | Form Pembayaran</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top custom-navbar">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="index.html">
                <i class="bi bi-heart-pulse-fill me-2 text-warning"></i> Apotek Desa Margomulyo
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Beranda</a></li>
                    <li class="nav-item"><a class="nav-link" href="tentang kami.html">Tentang</a></li>
                    <li class="nav-item"><a class="nav-link" href="katalog produk.html">Katalog</a></li>
                    <li class="nav-item"><a class="nav-link active" href="bayar.html">Bayar</a></li>
                    <li class="nav-item"><a class="nav-link" href="kontak.html">Kontak</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="py-5">
        <div class="container" style="max-width: 650px;">
            <div class="card border-0 shadow-sm p-4 rounded-4">
                <div class="text-center mb-4">
                    <i class="bi bi-credit-card-2-front text-primary display-4"></i>
                    <h3 class="fw-bold mt-2">Formulir Pesanan Obat</h3>
                    <p class="text-muted small">Lengkapi data untuk mempercepat proses verifikasi apoteker.</p>
                </div>
                
                <form action="#" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-medium text-secondary">Nama Lengkap Pasien / Pembeli</label>
                        <input type="text" class="form-control py-2" required placeholder="Masukkan nama penerima manfaat">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-medium text-secondary">Pilih Produk Kebutuhan Medis</label>
                        <select class="form-select py-2">
                            <option>Paracetamol 500mg — Rp 8.500</option>
                            <option>Vitamin C 1000mg — Rp 42.000</option>
                            <option>Amoxicillin 500mg — Rp 15.000</option>
                            <option>Tensimeter Digital — Rp 285.000</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-medium text-secondary">Metode Kanal Pembayaran</label>
                        <select class="form-select py-2">
                            <option>Transfer Bank Virtual Account (Mandiri / BCA / BNI)</option>
                            <option>Instant QRIS Seluruh E-Wallet (Dana/OVO/Gopay)</option>
                            <option>Bayar di Tempat Finansial (COD Kurir Apotek)</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-medium text-secondary">Unggah Foto Nota/Resep Dokter <span class="text-danger small">*Wajib untuk Amoxicillin</span></label>
                        <input type="file" class="form-control">
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow-sm">Konfirmasi Pembayaran Anda</button>
                </form>
            </div>
        </div>
    </section>

    <footer class="footer py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-0">© 2026 Apotek Desa Margomulyo | Menyediakan Pelayanan Farmasi & Kesehatan Prima</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
